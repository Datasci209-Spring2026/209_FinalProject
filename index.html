<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>209 Final Project</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
  <style>
    :root {
      --matt-text: #1f2937;
      --matt-muted: #6b7280;
      --matt-border: rgba(255,255,255,0.14);
      --matt-bg: #f5f7fa;
      --tab-bg: rgba(255,255,255,0.12);
      --tab-active: #dce9f7;
      --tab-active-text: #0f172a;
      --surface: rgba(255,255,255,0.82);
      --surface-strong: rgba(255,255,255,0.92);
      --shadow: 0 18px 60px rgba(15, 23, 42, 0.14);
      --nav-bg: rgba(10, 18, 30, 0.72);
      --nav-border: rgba(255,255,255,0.12);
      --hero-text: #f8fafc;
      --hero-muted: rgba(248, 250, 252, 0.88);
      --accent: #a8d5ba;
      --accent-2: #8ecae6;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--matt-text);
      background:
        radial-gradient(circle at top left, rgba(142, 202, 230, 0.25), transparent 35%),
        linear-gradient(180deg, #eef4f8 0%, #f8fafc 30%, #edf3f7 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .site-header {
      position: sticky;
      top: 0;
      width: 100%;
      background: var(--nav-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--nav-border);
      z-index: 1000;
    }

    .site-header-inner {
      width: min(1500px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 18px 0 16px;
    }

    .page-title {
      margin: 0 0 14px;
      color: #f8fafc;
      font-size: clamp(1.05rem, 1.2vw + 0.9rem, 1.65rem);
      font-weight: 650;
      letter-spacing: 0.01em;
    }

    .page {
      width: 100%;
      margin: 0 auto;
      padding: 0 0 84px;
    }

    .tab-panel-title,
    .section-heading,
    .subsection-title,
    .chart-section,
    .chart-block,
    .story-panel,
    .chart-anchor {
      scroll-margin-top: 120px;
    }

    .page-intro {
      margin: 0 0 28px;
      color: var(--matt-muted);
      line-height: 1.65;
    }

    .tab-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0;
      padding-bottom: 4px;
    }

    .tab-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.16);
      background: var(--tab-bg);
      color: #e5eef9;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .tab-button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .tab-button.active {
      background: var(--tab-active);
      color: var(--tab-active-text);
      border-color: transparent;
      box-shadow: 0 8px 24px rgba(148, 163, 184, 0.18);
    }

    .standard-panel {
      width: min(1500px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 0;
    }

    .tab-panel-title {
      margin: 0 0 10px;
      font-size: 1.9rem;
    }

    .tab-panel-intro {
      margin: 0 0 28px;
      color: var(--matt-muted);
      line-height: 1.65;
      white-space: pre-line;
    }

    .dashboard-divider {
      margin: 56px auto;
      width: min(1300px, calc(100vw - 52px));
      border: 0;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
    }

    .subsection-title {
      margin: 0 0 10px;
      font-size: 1.5rem;
      font-weight: 650;
    }

    .subsection-copy,
    .section-intro-copy,
    .chart-lead,
    .story-panel-copy {
      margin: 0;
      color: var(--matt-muted);
      line-height: 1.75;
      font-size: 1.02rem;
    }

    .vis {
      width: 100%;
      min-height: 120px;
    }

    .vega-embed { width: 100%; }
    .vega-actions { display: none; }

    tableau-viz {
      width: 100%;
      height: 900px;
      margin-bottom: 0;
      display: block;
    }

    .placeholder-card {
      padding: 28px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 24px;
      background: #fff;
      box-shadow: var(--shadow);
      line-height: 1.7;
    }

    .final-project-shell {
      width: 100%;
    }

    .story-hero,
    .story-panel {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
    }

    .story-hero::before,
    .story-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--section-image);
      background-size: cover;
      background-position: center;
      transform: scale(1.03);
      z-index: -3;
    }

    .story-hero::after,
    .story-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(5, 10, 20, 0.32) 0%, rgba(7, 12, 20, 0.46) 42%, rgba(5, 10, 20, 0.62) 100%),
        linear-gradient(135deg, rgba(23, 67, 88, 0.28), rgba(62, 111, 126, 0.18), rgba(123, 160, 91, 0.16));
      z-index: -2;
    }

    .story-hero-inner,
    .story-panel-inner {
      width: min(1000px, calc(100vw - 48px));
      text-align: center;
      padding: 90px 0;
      color: var(--hero-text);
    }

    .story-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 9px 16px;
      border-radius: 999px;
      margin-bottom: 22px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(248, 250, 252, 0.95);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }

    .story-title {
      margin: 0 0 18px;
      font-size: clamp(2.6rem, 5vw, 5.4rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
      text-shadow: 0 8px 30px rgba(0,0,0,0.28);
    }

    .story-subtitle {
      max-width: 780px;
      margin: 0 auto;
      color: var(--hero-muted);
      font-size: clamp(1.08rem, 1.2vw + 0.75rem, 1.45rem);
      line-height: 1.75;
      text-shadow: 0 6px 24px rgba(0,0,0,0.22);
    }

    .story-scroll-note {
      margin-top: 28px;
      color: rgba(248, 250, 252, 0.84);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .content-shell {
      width: min(1340px, calc(100vw - 42px));
      margin: -60px auto 0;
      position: relative;
      z-index: 5;
    }

    .chart-anchor,
    .chart-block,
    .chart-section {
      margin: 0 0 28px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(255,255,255,0.82));
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .chart-anchor {
      display: grid;
      gap: 14px;
    }

    .chart-anchor h3,
    .chart-block h3,
    .chart-section h3 {
      margin: 0;
      font-size: clamp(1.18rem, 1.3vw, 1.45rem);
      line-height: 1.35;
      font-weight: 650;
      color: #0f172a;
    }

    .chart-card,
    .section-block,
    .chart4-layout,
    .chart5v2-layout {
      display: block;
      margin-top: 18px;
    }

    .chart-footnote {
      margin-top: 16px !important;
      font-size: 0.96rem;
    }

    .transition-copy {
      width: min(900px, calc(100vw - 54px));
      margin: 0 auto 56px;
      padding: 0 0 0;
      text-align: center;
    }

    .transition-copy p {
      color: #546070;
      font-size: 1.08rem;
      line-height: 1.9;
      margin: 0;
    }

    .section-heading {
      margin: 0 0 16px;
      font-size: clamp(2.1rem, 3.2vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .chart-grid-spacious {
      display: grid;
      gap: 28px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 18px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(241, 245, 249, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .controls > div {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
    }

    .controls label {
      font-size: 0.92rem;
      font-weight: 700;
      color: #334155;
    }

    .controls select,
    .controls input[type="range"] {
      width: 100%;
    }

    .controls select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: white;
      color: #0f172a;
    }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .chart-intro-mini {
      width: min(820px, calc(100vw - 60px));
      margin: 0 auto 30px;
      text-align: center;
    }

    .data-sources-block {
      width: min(1200px, calc(100vw - 42px));
      margin: 0 auto;
      padding: 34px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.84));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.55);
    }

    .data-sources-block p {
      line-height: 1.9;
    }

    @media (max-width: 920px) {
      .site-header-inner,
      .standard-panel { width: min(100vw - 28px, 1500px); }
      .story-hero-inner,
      .story-panel-inner { width: min(100vw - 28px, 1000px); }
      .content-shell,
      .data-sources-block,
      .dashboard-divider { width: min(100vw - 28px, 1340px); }
      .chart-anchor,
      .chart-block,
      .chart-section { padding: 22px; border-radius: 22px; }
      tableau-viz { height: 760px; }
    }

    @media (max-width: 640px) {
      .page-title { line-height: 1.35; }
      .tab-nav { gap: 8px; }
      .tab-button { width: 100%; justify-content: center; }
      .story-title { font-size: clamp(2.25rem, 11vw, 4rem); }
      .story-subtitle { font-size: 1rem; line-height: 1.75; }
      .chart-anchor,
      .chart-block,
      .chart-section,
      .data-sources-block,
      .placeholder-card { padding: 18px; }
      tableau-viz { height: 640px; }
      .controls > div { min-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="page-title">Global Greenhouse Gas Emissions, Energy Consumption, and US Energy Production</h1>

      <nav class="tab-nav" aria-label="Project tabs">
        <button class="tab-button active" data-tab="final-project">Final Project</button>
        <button class="tab-button" data-tab="supplemental-visualizations">Supplemental Visualizations</button>
        <button class="tab-button" data-tab="sources-and-methods">Sources and Methods</button>
        <button class="tab-button" data-tab="usability-study">Usability Study</button>
      </nav>
    </div>
  </header>

  <main class="page">
    <div id="tab-content"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <script>
    const embedOptions = {
      actions: false,
      renderer: "svg"
    };

    const finalProjectContent = `
      <div class="final-project-shell">
        <section class="story-hero reveal" style="--section-image: url('images/sections/intro-hero.png');">
          <div class="story-hero-inner">
            <div class="story-kicker">Intro</div>
            <h2 class="story-title">Global Greenhouse Gas Emissions, Energy Consumption, and US Energy Production</h2>
            <p class="story-subtitle">Energy systems shape daily life, economic growth, and climate outcomes. This project connects where greenhouse gas emissions are highest, how energy demand changes across countries and over time, and how electricity is actually generated in the United States.</p>
            <div class="story-scroll-note">Scroll to follow the story</div>
          </div>
        </section>

        <section class="story-panel reveal" style="--section-image: url('images/sections/ghg-section.png');">
          <div class="story-panel-inner">
            <div class="story-kicker">Section 1</div>
            <h2 class="section-heading">Global Greenhouse Gas Emissions</h2>
            <p class="story-subtitle">Greenhouse gas emissions provide the starting point for the story. These charts show where emissions are concentrated, how they differ across places, and how unevenly responsibility is distributed.</p>
          </div>
        </section>

        <div class="content-shell chart-grid-spacious">
          <section class="chart-anchor reveal">
            <h3>Chart 1 - Identifying the Countries with the Largest GHG Emissions and How These Emissions Have Evolved</h3>
            <tableau-viz src="https://public.tableau.com/views/finalprojecteda_17718376269310/CombinedSheet12"></tableau-viz>
          </section>

          <section class="chart-anchor reveal">
            <h3>Chart 2 - A Look at GHG Emmisions by Sector</h3>
            <tableau-viz src="https://public.tableau.com/views/finalprojecteda_17718376269310/Sheet3"></tableau-viz>
          </section>
        </div>

        <hr class="dashboard-divider" />

        <div class="transition-copy reveal">
          <p>The emissions shown above are closely tied to the way societies use energy. The power industry sits at the center of the climate story, since it makes up the largest single share of global greenhouse gas emissions. By looking at how much energy countries use, how demand changes over time, and the extent to which that demand is met by low-carbon sources, we can better understand both what drives emissions and where opportunities for a cleaner energy future are already taking shape.</p>
        </div>

        <section class="story-panel reveal" style="--section-image: url('images/sections/energy-consumption-section.png');">
          <div class="story-panel-inner">
            <div class="story-kicker">Section 2</div>
            <h2 class="section-heading">World-Wide Energy Consumption</h2>
            <p class="story-subtitle">If the first section shows the scale of the emissions problem, this section begins to explain why it exists. Energy consumption reveals both the drivers of emissions and the early signs of a cleaner energy transition.</p>
          </div>
        </section>

        <div class="content-shell chart-grid-spacious">
          <section class="chart-anchor reveal">
            <h3>Chart 3 - World-Wide Energy Consumption is on the Rise</h3>
            <p class="chart-lead">This chart highlights both the scale of growing energy demand and the early signs of a shift toward cleaner energy sources.</p>
            <div id="vis1" class="vis"></div>
            <p class="subsection-copy chart-footnote">Low-carbon energy includes sources such as wind, solar, hydro, and nuclear that generate little to no direct greenhouse gas emissions during operation.</p>
          </section>

          <section class="chart-anchor reveal">
            <h3>Chart 4 - Identifying Trends in the Adoption of Low-Carbon Energy Sources</h3>
            <p class="chart-lead">This chart aims to understand which countries have the largest share of low-carbon energy consumption, and why?</p>
            <p class="subsection-copy">To explore these questions, we grouped countries into five GDP per capita quantiles ranging from Very Low to Very High and fit a regression line for low-carbon energy share (%) as a function of GDP per capita. Across all years, this regression has a positive slope, suggesting that wealthier countries tend to consume a larger share of low-carbon energy.</p>
            <div id="vis2" class="vis"></div>
          </section>
        </div>

        <hr class="dashboard-divider" />

        <div class="transition-copy reveal">
          <p>These results help explain broad global patterns in energy consumption, but they also point to an important national case study. The United States has consistently had a relatively low low-carbon energy share, especially compared with outliers like Norway. That raises the next question: what in the U.S. energy system helps explain this difference? To answer that, the next section shifts from energy consumption to energy production, focusing on how electricity is generated in the United States and how the balance between fossil fuels and low-carbon sources has changed over time.</p>
        </div>

        <section class="story-panel reveal" style="--section-image: url('images/sections/us-power-section.png');">
          <div class="story-panel-inner">
            <div class="story-kicker">Section 3</div>
            <h2 class="section-heading">United States Power Generation</h2>
            <p class="story-subtitle">This section moves from broad global trends to the specific infrastructure choices that shape the U.S. energy system, showing how electricity generation has evolved over time and where a cleaner grid is beginning to take shape.</p>
          </div>
        </section>

        <div class="content-shell chart-grid-spacious">
          <section class="chart-section reveal">
            <h3>Chart 5 - U.S. Energy Sources Overview</h3>
            <p class="subsection-copy">This chart provides a high-level summary of how the U.S. electrical grid has changed from 2001 to 2024. Coal once dominated power generation, but its role has steadily declined while natural gas expanded rapidly and became the largest single source of electricity. At the same time, low-carbon sources such as wind and solar have grown quickly, especially in the past decade.</p>
            <div class="chart-card legend-aligned">
              <div id="chart2"></div>
              <p class="subsection-copy chart-footnote">“Other” includes all remaining generation sources that are too small to be considered as primary categories, such as geothermal, biomass, petroleum-based fuels, landfill gas, municipal solid waste, and other smaller or mixed fuel types.</p>
            </div>
          </section>

          <section class="chart-section reveal">
            <h3>Chart 6 - Identifying the Largest Changes in U.S. Energy Sources</h3>
            <p class="subsection-copy">The previous chart shows the broad reshaping of the U.S. grid over time but does not answer the question how quickly those changes are happening. This chart focuses on the pace of change by comparing both annual shifts and longer-run compound annual growth rates across energy sources.</p>
            <div class="chart-card legend-aligned">
              <div id="chart3"></div>
            </div>
          </section>

          <section class="chart-section reveal">
            <h3>Chart 7 - Power generation Varies Significatly at the State Level</h3>
            <p class="subsection-copy">National trends are informative but they can obscure how varied electricity generation is by individual states. This chart presents an overview of the top 9 energy producing states.</p>
            <div class="chart4-layout">
              <div class="chart-card chart-span-3 legend-aligned">
                <div id="chart4"></div>
              </div>
            </div>
          </section>

          <section class="chart-section reveal">
            <h3>Chart 8 - Explore U.S. Energy Sources at the State Level</h3>
            <p class="subsection-copy">Even among the largest generating states, the paths toward energy transition differ substantially. This chart allows the user to focus on one state at a time and trace its unique energy mix over time.</p>
            <div class="section-block">
              <div class="controls">
                <div>
                  <label for="selectedState">Select a state</label>
                  <select id="selectedState"></select>
                </div>
              </div>
              <div class="chart-card legend-aligned">
                <div id="chart5"></div>
              </div>
            </div>
          </section>

          <section class="chart-section reveal">
            <h3>Chart 9 - Compare State Energy Sources Side by Side</h3>
            <p class="subsection-copy">Direct comparison between states makes the contrast much easier to understand. Select two states you would like to view side by side.</p>
            <div class="section-block">
              <div class="controls">
                <div>
                  <label for="selectedStateLeft">Select State 1</label>
                  <select id="selectedStateLeft"></select>
                </div>
                <div>
                  <label for="selectedStateRight">Select State 2</label>
                  <select id="selectedStateRight"></select>
                </div>
              </div>
              <div class="chart5v2-layout">
                <div class="chart-card chart-span-2 legend-aligned">
                  <div id="chart5_v2"></div>
                </div>
              </div>
            </div>
          </section>

          <section class="chart-section reveal">
            <h3>Chart 10 - Primary Energy Sources by Geographic Areas</h3>
            <p class="subsection-copy">This chart examines how primary energy sources vary by geographic areas across the United States.</p>
            <div class="section-block">
              <div class="controls">
                <div>
                  <label for="selectedSource">Energy source</label>
                  <select id="selectedSource"></select>
                </div>
                <div>
                  <label for="selectedYear">Year</label>
                  <input id="selectedYear" type="range" min="2001" max="2024" step="1" value="2001" />
                  <span id="selectedYearValue">2001</span>
                </div>
              </div>
              <div class="chart-card legend-aligned">
                <div id="chart6"></div>
              </div>
            </div>
          </section>

          <section class="chart-section reveal">
            <h3>Chart 11 - An Overview of Power Plants Across U.S. by Dominant Energy Source</h3>
            <p class="subsection-copy">State-level maps show where generation is concentrated, but they still treat electricity production as an aggregate. The next chart moves down to the level of individual power plants.</p>
            <div class="section-block">
              <div class="controls">
                <div>
                  <label for="selectedPlantSource">Dominant energy source</label>
                  <select id="selectedPlantSource"></select>
                </div>
                <div>
                  <label for="selectedPlantYear">Year</label>
                  <input id="selectedPlantYear" type="range" min="2001" max="2024" step="1" value="2024" />
                  <span id="selectedPlantYearValue">2024</span>
                </div>
              </div>
              <div class="chart-card legend-aligned">
                <div id="chart7"></div>
              </div>
            </div>
          </section>

          <section class="chart-section reveal">
            <h3>Chart 12 - State Level Overview of Power Plants by Dominant Energy Source</h3>
            <p class="subsection-copy">Finally, after viewing the national distribution of power plants, this last chart zooms into a single state to show how plant locations relate to county boundaries and major cities.</p>
            <div class="section-block">
              <div class="controls">
                <div>
                  <label for="selectedMapState">State</label>
                  <select id="selectedMapState"></select>
                </div>
                <div>
                  <label for="selectedSTPlantSource">Dominant energy source</label>
                  <select id="selectedSTPlantSource"></select>
                </div>
                <div>
                  <label for="selectedSTPlantYear">Year</label>
                  <input id="selectedSTPlantYear" type="range" min="2001" max="2024" step="1" value="2024" />
                  <span id="selectedSTPlantYearValue">2024</span>
                </div>
                <div>
                  <label for="showTopCities">City overlay</label>
                  <input id="showTopCities" type="checkbox" checked />
                  <span>Show top 10 cities</span>
                </div>
              </div>
              <div class="chart-card legend-aligned">
                <div id="chart8"></div>
              </div>
            </div>
          </section>
        </div>

        <hr class="dashboard-divider" />

        <section class="story-panel reveal" style="--section-image: url('images/sections/conclusion-section.png'); min-height: 88vh;">
          <div class="story-panel-inner">
            <div class="story-kicker">Conclusion</div>
            <h2 class="section-heading">Connecting Emissions, Consumption, and Infrastructure</h2>

    const content = document.getElementById("tab-content");

    function patchD3ForDataPrefix() {
      if (window.__d3DataPrefixPatched) return;
      window.__d3DataPrefixPatched = true;

      const originalCsv = d3.csv.bind(d3);
      d3.csv = function(url, ...args) {
        const prefix = window.__ACTIVE_DATA_PREFIX__ || "";
        const isRelativeDataPath =
          typeof url === "string" &&
          url.startsWith("data/") &&
          !url.startsWith("http://") &&
          !url.startsWith("https://") &&
          !url.startsWith("/");
        const rewrittenUrl = isRelativeDataPath && prefix ? `${prefix}/${url}` : url;
        return originalCsv(rewrittenUrl, ...args);
      };
    }

    function clearTransientTooltips() {
      [
        ".chart1-tooltip",
        ".chart2-tooltip",
        ".chart3-tooltip",
        ".chart4-tooltip",
        ".chart5-tooltip",
        ".chart5-v2-tooltip",
        ".chart6-tooltip",
        ".chart7-tooltip",
        ".state-plant-map-tooltip"
      ].forEach((selector) => {
        document.querySelectorAll(selector).forEach((node) => node.remove());
      });
    }

    function removeOldModuleScript() {
      const oldScript = document.getElementById("active-dashboard-module");
      if (oldScript) oldScript.remove();
    }

    function initRevealAnimations() {
      const items = document.querySelectorAll('.reveal');
      if (!items.length) return;
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.16 });
      items.forEach((item) => observer.observe(item));
    }

    async function loadDashboardModule(moduleBase, tabKey) {
      removeOldModuleScript();
      const script = document.createElement("script");
      script.type = "module";
      script.id = "active-dashboard-module";
      script.textContent = `import "./${moduleBase}/main.js?tab=${encodeURIComponent(tabKey)}&ts=${Date.now()}";`;
      document.body.appendChild(script);
      await new Promise((resolve) => setTimeout(resolve, 50));
    }

    async function renderDashboard(tabKey, config) {
      if (tabKey === 'final-project') {
        content.innerHTML = finalProjectContent;
      } else {
        content.innerHTML = `
          <div class="standard-panel">
            <section>
              <h2 class="tab-panel-title">${config.title}</h2>

            </section>
          </div>
          ${finalProjectContent}
        `;
      }

      window.__ACTIVE_DATA_PREFIX__ = config.dataPrefix;
      patchD3ForDataPrefix();
      clearTransientTooltips();

      const specBase = config.dataPrefix ? `${config.dataPrefix}/data` : "data";
      await vegaEmbed("#vis1", `${specBase}/viz1.vl.json`, embedOptions).catch(console.error);
      await vegaEmbed("#vis2", `${specBase}/viz2.vl.json`, embedOptions).catch(console.error);
      await loadDashboardModule(config.moduleBase, tabKey);
      initRevealAnimations();
    }

            <p class="tab-panel-intro">${config.intro}</p>
            ${config.body}

      `;

    async function setActiveTab(tabKey) {
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tabKey);
      });
      const config = tabConfig[tabKey];
      if (!config) return;
      if (config.type === "dashboard") {
        await renderDashboard(tabKey, config);
      } else if (config.type === "custom") {
        await renderCustom(config, tabKey);
      } else {
        renderPlaceholder(config);
      }
    }

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => setActiveTab(button.dataset.tab));
    });
