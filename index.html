<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>209 Final Project</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
  <style>
    :root {
      --matt-text: #333;
      --matt-muted: #6b7280;
      --matt-border: #e5e7eb;
      --matt-bg: #ffffff;
      --tab-bg: #f8fafc;
      --tab-active: #111827;
      --tab-active-text: #ffffff;
    }
	
	header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background: #222;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 1000;
	}

    body {
      margin: 0;
      color: var(--matt-text);
      background: var(--matt-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 72px;
    }

    .page > h1 {
      margin-bottom: 10px;
    }

    .page-intro {
      margin: 0 0 28px;
      color: var(--matt-muted);
      line-height: 1.5;
    }

    .tab-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--matt-border);
    }

    .tab-button {
      appearance: none;
      border: 1px solid var(--matt-border);
      background: var(--tab-bg);
      color: var(--matt-text);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-button:hover {
      border-color: #cbd5e1;
      background: #f1f5f9;
    }

    .tab-button.active {
      background: var(--tab-active);
      color: var(--tab-active-text);
      border-color: var(--tab-active);
    }

    .tab-panel-title {
      margin: 0 0 10px;
      font-size: 1.75rem;
    }

    .tab-panel-intro {
      margin: 0 0 28px;
      color: var(--matt-muted);
      line-height: 1.5;
      white-space: pre-line;
    }

    .dashboard-divider {
      margin: 36px 0 28px;
      border: 0;
      border-top: 1px solid var(--matt-border);
    }

    .subsection-title {
      margin: 0 0 10px;
      font-size: 1.4rem;
      font-weight: 550;
    }

    .subsection-copy {
      margin: 0 0 24px;
      color: var(--matt-muted);
      line-height: 1.55;
    }

    .chart-block {
      margin: 0 0 32px;
      padding: 18px 18px 10px;
      border: 1px solid var(--matt-border);
      border-radius: 14px;
      background: #fff;
      overflow-x: auto;
    }

    .chart-block h3,
    .chart-section h3 {
      margin: 0 0 14px;
      font-size: 1.05rem;
      font-weight: 500;
    }

    .chart-section {
      margin: 0 0 32px;
    }

    .vis {
      width: 100%;
      min-height: 120px;
    }

    .vega-embed {
      width: 100%;
    }

    .vega-actions {
      display: none;
    }

    tableau-viz {
      width: 100%;
      height: 900px;
      margin-bottom: 20px;
      display: block;
    }

    .placeholder-card {
      padding: 24px;
      border: 1px solid var(--matt-border);
      border-radius: 14px;
      background: #fff;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header>
    <h1>Global Greenhouse Gas Emissions, Energy Consumption, and US Energy Production</h1>
    <p class="page-intro">
      This visualization was created to aid students and the general public understand the sources of greenhouse gas emissions, the demands of global energy consumption, and in-depth review of domestic US energy production.
    </p>

    <nav class="tab-nav" aria-label="Project tabs">
      <button class="tab-button active" data-tab="final-project">Final Project</button>
      <button class="tab-button" data-tab="supplemental-visualizations">Supplemental Visualizations</button>
      <button class="tab-button" data-tab="sources-and-methods">Sources and Methods</button>
      <button class="tab-button" data-tab="usability-study">Usability Study</button>
    </nav>

    <div id="tab-content"></div>
  </header>


  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <script>
    const embedOptions = {
      actions: false,
      renderer: "svg"
    };

    const dashboardContent = `
      <section class="story-section-intro">
        <h2 class="section-heading">1. Emissions</h2>
        <p class="section-intro-copy">
          Greenhouse gas emissions provide the starting point for the story. These charts show where emissions are concentrated, how they differ across places, and how unevenly responsibility is distributed. The goal of this section is to frame climate change not as an abstract global issue, but as a measurable pattern that varies by country, region, and scale.
        </p>
      </section>

      <section>
        <h2 class="subsection-title">Global Greenhouse Gas Emissions</h2>
        <p class="subsection-copy">
          Interactive Tableau charts embedded from Tableau Public.
        </p>

        <section class="chart-block">
          <h3>Chart 1</h3>
          <tableau-viz src="https://public.tableau.com/views/finalprojecteda_17718376269310/CombinedSheet12"></tableau-viz>
        </section>
		  
      <hr class="dashboard-divider" />

        <section class="chart-block">
          <h3>Chart 2</h3>
          <tableau-viz src="https://public.tableau.com/views/finalprojecteda_17718376269310/Sheet3"></tableau-viz>
        </section>
      </section>

	  <section>
		<p class="subsection-copy">
		
		
		  The emissions shown above are closely tied to the way societies use energy. The power industry sits at the center of the climate story, since it makes up the largest single share of global greenhouse gas emissions. By looking at how much energy countries use, how demand changes over time, and the extent to which that demand is met by low-carbon sources, we can better understand both what drives emissions and where opportunities for a cleaner energy future are already taking shape.
		</p>

      <hr class="dashboard-divider" />

      <section class="section-transition">
        <h2 class="section-heading">2. World-Wide Energy Consumption</h2>
        <p class="section-intro-copy">
          If the first section shows the scale of the emissions problem, this section begins to explain why it exists. Energy consumption is a key part of that story: as countries grow and demand more power, the climate impact depends not only on how much energy is used, but also on whether that energy comes from fossil fuels or low-carbon sources. The charts in this section are designed to reveal both the drivers of emissions and the early signs of a cleaner energy transition.
        </p>
      </section>

      <section>
        <h2 class="subsection-title">Global Energy Consumption Charts</h2>
        <p class="subsection-copy">
          Vega and Vega-Lite charts loaded from external specification files in the active data directory.
        </p>

        <section class="chart-block">
          <h3>Chart 3</h3>
          <p class="subsection-copy">
            This chart highlights both the scale of growing energy demand and the early signs of a shift toward cleaner energy sources.
          </p>
          <div id="vis1" class="vis"></div>
            <p class="subsection-copy chart-footnote">
              Low-carbon energy includes sources such as wind, solar, hydro, and nuclear that generate little to no direct greenhouse gas emissions during operation.
            </p>
        </section>
		  
      <hr class="dashboard-divider" />
		  
        <section class="chart-block">
          <h3>Chart 4</h3>
          <p class="subsection-copy">
            This chart aims to understand which countries have the largest share of low-carbon energy consumption, and why?
          </p>
          <p class="subsection-copy">
            To explore these questions, we grouped countries into five GDP per capita quantiles ranging from Very Low to Very High and fit a regression line for low-carbon energy share (%) as a function of GDP per capita. Across all years, this regression has a positive slope, suggesting that wealthier countries tend to consume a larger share of low-carbon energy.
          </p>
          <div id="vis2" class="vis"></div>
        </section>
      </section>

	  <section>
		<p class="subsection-copy">
		
		
		  These results help explain broad global patterns in energy consumption, but they also point to an important national case study. The United States has consistently had a relatively low low-carbon energy share, especially compared with outliers like Norway. That raises the next question: what in the U.S. energy system helps explain this difference? To answer that, the next section shifts from energy consumption to energy production, focusing on how electricity is generated in the United States and how the balance between fossil fuels and low-carbon sources has changed over time.
		</p>

      <hr class="dashboard-divider" />

        <section class="section-transition">
          <h2 class="section-heading">3. United States Power Generation</h2>
          <p class="section-intro-copy">
            While the previous section explained how energy demand and low-carbon energy consumption vary across countries, this section asks a more focused question: what does the U.S. energy system actually look like beneath those patterns? By turning from consumption to power generation, these charts show how the United States has produced electricity over time and how the balance between fossil fuels and low-carbon sources has shifted. The goal of this section is to move from broad global trends to the specific infrastructure choices that help explain why the United States has often consumed a smaller share of low-carbon energy than some of its peers, while also revealing where progress toward a cleaner grid is beginning to take shape.
          </p>
        </section>

      <section>
        <h2 class="subsection-title">US Power Generation Exploration</h2>
        <p class="subsection-copy">
          Interactive D3 charts and maps for U.S. power generation by state and energy source.
        </p>
		  
        <section class="chart-section">
          <h3>Chart 5 - U.S. Energy Sources Overview</h3>
          <p class="subsection-copy">
            This chart provides a high-level summary of how the U.S. electrical grid has changed from 2001 to 2024. Coal once dominated power generation, but its role has steadily declined while natural gas expanded rapidly and became the largest single source of electricity. At the same time, low-carbon sources such as wind and solar have grown quickly, especially in the past decade.
          </p>
          <div class="chart-card legend-aligned">
            <div id="chart2"></div>
            <p class="subsection-copy chart-footnote">
              “Other” includes all remaining generation sources that are too small to be considered as primary categories, such as geothermal, biomass, petroleum-based fuels, landfill gas, municipal solid waste, and other smaller or mixed fuel types.
            </p>
          </div>
        </section>

        <section class="chart-section">
          <h3>Chart 6 - Identifying the Largest Changes in U.S. Energy Sources</h3>
          <p class="subsection-copy">
            The previous chart shows the broad reshaping of the U.S. grid over time but does not answer the question how quickly those changes are happening. This chart focuses on the pace of change by comparing both annual shifts and longer-run compound annual growth rates across energy sources.
          </p>
          <div class="chart-card legend-aligned">
            <div id="chart3"></div>
          </div>
        </section>

        <section class="chart-section">
          <h3>Chart 7 - Power generation Varies Significatly at the State Level</h3>
          <p class="subsection-copy">
            National trends are informative but they can obscure how varied electricity generation is by individual states. This chart presents an overview of the top 9 energy producing states.
          </p>
          <div class="chart4-layout">
            <div class="chart-card chart-span-3 legend-aligned">
              <div id="chart4"></div>
            </div>
          </div>
        </section>

        <section class="chart-section">
          <h3>Chart 8 - Explore U.S. Energy Sources at the State Level</h3>
          <p class="subsection-copy">
            Even among the largest generating states, the paths toward energy transition differ substantially. This chart allows the user to focus on one state at a time and trace its unique energy mix over time.
          </p>
          <div class="section-block">
            <div class="controls">
              <div>
                <label for="selectedState">Select a state</label>
                <select id="selectedState"></select>
              </div>
            </div>

            <div class="chart-card legend-aligned">
              <div id="chart5"></div>
            </div>
          </div>
        </section>

        <section class="chart-section">
          <h3>Chart 9 - Compare State Energy Sources Side by Side</h3>
          <p class="subsection-copy">
            Direct comparison between states makes the contrast much easier to understand. Select two states you would like to view side by side.
          </p>
          <div class="section-block">
            <div class="controls">
              <div>
                <label for="selectedStateLeft">Select State 1</label>
                <select id="selectedStateLeft"></select>
              </div>

              <div>
                <label for="selectedStateRight">Select State 2</label>
                <select id="selectedStateRight"></select>
              </div>
            </div>

            <div class="chart5v2-layout">
              <div class="chart-card chart-span-2 legend-aligned">
                <div id="chart5_v2"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="chart-section">
          <h3>Chart 10 - Primary Energy Sources by Geographic Areas</h3>
          <p class="subsection-copy">
            This chart examines how primary energy sources vary by geographic areas across the United States.
          </p>
          <div class="section-block">
            <div class="controls">
              <div>
                <label for="selectedSource">Energy source</label>
                <select id="selectedSource"></select>
              </div>

              <div>
                <label for="selectedYear">Year</label>
                <input
                  id="selectedYear"
                  type="range"
                  min="2001"
                  max="2024"
                  step="1"
                  value="2001"
                />
                <span id="selectedYearValue">2001</span>
              </div>
            </div>

            <div class="chart-card legend-aligned">
              <div id="chart6"></div>
            </div>
          </div>
        </section>

        <section class="chart-section">
          <h3>Chart 11 - An Overview of Power Plants Across U.S. by Dominant Energy Source</h3>
          <p class="subsection-copy">
            State-level maps show where generation is concentrated, but they still treat electricity production as an aggregate. The next chart moves down to the level of individual power plants.
          </p>
          <div class="section-block">
            <div class="controls">
              <div>
                <label for="selectedPlantSource">Dominant energy source</label>
                <select id="selectedPlantSource"></select>
              </div>

              <div>
                <label for="selectedPlantYear">Year</label>
                <input
                  id="selectedPlantYear"
                  type="range"
                  min="2001"
                  max="2024"
                  step="1"
                  value="2024"
                />
                <span id="selectedPlantYearValue">2024</span>
              </div>
            </div>

            <div class="chart-card legend-aligned">
              <div id="chart7"></div>
            </div>
          </div>
        </section>

        <section class="chart-section">
          <h3>Chart 12 - State Level Overview of Power Plants by Dominant Energy Source</h3>
          <p class="subsection-copy">
            Finally, after viewing the national distribution of power plants, this last chart zooms into a single state to show how plant locations relate to county boundaries and major cities.
          </p>
          <div class="section-block">
            <div class="controls">
              <div>
                <label for="selectedMapState">State</label>
                <select id="selectedMapState"></select>
              </div>

              <div>
                <label for="selectedSTPlantSource">Dominant energy source</label>
                <select id="selectedSTPlantSource"></select>
              </div>

              <div>
                <label for="selectedSTPlantYear">Year</label>
                <input
                  id="selectedSTPlantYear"
                  type="range"
                  min="2001"
                  max="2024"
                  step="1"
                  value="2024"
                />
                <span id="selectedSTPlantYearValue">2024</span>
              </div>

              <div>
                <label for="showTopCities">City overlay</label>
                <input
                  id="showTopCities"
                  type="checkbox"
                  checked
                />
                <span>Show top 10 cities</span>
              </div>
            </div>

            <div class="chart-card legend-aligned">
              <div id="chart8"></div>
            </div>
          </div>
        </section>
      </section>

      <hr class="dashboard-divider" />

      <section>
        <h2 class="subsection-title">Data Sources</h2>
        <p class="subsection-copy">
          1. U.S Energy Information Administration (EIA) Form EIA-923 monthly reports.<br />
          2. Emissions Database for Global Atmospheric Research (EDGAR) from the European Comission.<br />
          3. Hannah Ritchie, Pablo Rosado, and Max Roser (2023) - “Energy” Published online at OurWorldinData.org. Retrieved from: 'https://ourworldindata.org/energy'.<br />
        </p>
      </section>
    `;

    const tabConfig = {
      "final-project": {
        title: "Final Project",
        intro: "Below are the final visualizations updated to address feedback from the usability study.",
        type: "dashboard",
        dataPrefix: "",
        moduleBase: "js"
      },
      "usability-study": {
        title: "Usability Study",
        intro: `This tab preserves the current layout of the usability study website and routes chart assets through the usability_study folder.

Usability Study Results: <a href="usability_study/Group_3_Usability_Study.docx" target="_blank" rel="noopener noreferrer">Group_3_Usability_Study.docx</a>`,
        type: "dashboard",
        dataPrefix: "usability_study",
        moduleBase: "usability_study/js"
      },
      "supplemental-visualizations": {
        title: "Supplemental Visualizations",
        intro: "Additional charts and alternate views that support the final project findings.",
        type: "custom",
        dataPrefix: "",
        moduleBase: "js",
        body: `
          <section class="chart-block">
            <h3>Energy Consumption Choropleth Chart</h3>
            <div id="consumption-choropleth" class="vis"></div>
          </section>
		  
		  <hr class="dashboard-divider" />

          <section class="chart-block">
            <h3>Summary of Usability Study Responses</h3>
            <p class="subsection-copy" style="margin-top: -4px; margin-bottom: 18px;">
              Google form link:
              <a
                href="https://forms.gle/JJaWbMGqCpNdPFAw5"
                target="_blank"
                rel="noopener noreferrer"
              >
                https://forms.gle/JJaWbMGqCpNdPFAw5
              </a>
            </p>
            <div id="likert-chart"></div>
          </section>
        `
      },
      "sources-and-methods": {
        title: "Sources and Methods",
        intro: "Use this tab for methodology notes, data provenance, cleaning decisions, and chart design rationale.",
        type: "placeholder",
        body: `
          <div class="placeholder-card">
            Add your methods write-up, source citations, assumptions, and data-processing notes here.
          </div>
        `
      }
    };

    const content = document.getElementById("tab-content");

    function patchD3ForDataPrefix() {
      if (window.__d3DataPrefixPatched) return;
      window.__d3DataPrefixPatched = true;

      const originalCsv = d3.csv.bind(d3);

      d3.csv = function(url, ...args) {
        const prefix = window.__ACTIVE_DATA_PREFIX__ || "";
        const isRelativeDataPath =
          typeof url === "string" &&
          url.startsWith("data/") &&
          !url.startsWith("http://") &&
          !url.startsWith("https://") &&
          !url.startsWith("/");

        const rewrittenUrl = isRelativeDataPath && prefix
          ? `${prefix}/${url}`
          : url;

        return originalCsv(rewrittenUrl, ...args);
      };
    }

    function clearTransientTooltips() {
      [
        ".chart1-tooltip",
        ".chart2-tooltip",
        ".chart3-tooltip",
        ".chart4-tooltip",
        ".chart5-tooltip",
        ".chart5-v2-tooltip",
        ".chart6-tooltip",
        ".chart7-tooltip",
        ".state-plant-map-tooltip"
      ].forEach((selector) => {
        document.querySelectorAll(selector).forEach((node) => node.remove());
      });
    }

    function removeOldModuleScript() {
      const oldScript = document.getElementById("active-dashboard-module");
      if (oldScript) oldScript.remove();
    }

    async function loadDashboardModule(moduleBase, tabKey) {
      removeOldModuleScript();

      const script = document.createElement("script");
      script.type = "module";
      script.id = "active-dashboard-module";
      script.textContent = `
        import "./${moduleBase}/main.js?tab=${encodeURIComponent(tabKey)}&ts=${Date.now()}";
      `;

      document.body.appendChild(script);

      await new Promise((resolve) => setTimeout(resolve, 50));
    }

    async function renderDashboard(tabKey, config) {
      content.innerHTML = `
        <section>
          <h2 class="tab-panel-title">${config.title}</h2>
          <p class="tab-panel-intro">${config.intro}</p>
        </section>
        ${dashboardContent}
      `;

      window.__ACTIVE_DATA_PREFIX__ = config.dataPrefix;
      patchD3ForDataPrefix();
      clearTransientTooltips();

      const specBase = config.dataPrefix ? `${config.dataPrefix}/data` : "data";

      await vegaEmbed("#vis1", `${specBase}/viz1.vl.json`, embedOptions).catch(console.error);
      await vegaEmbed("#vis2", `${specBase}/viz2.vl.json`, embedOptions).catch(console.error);

      await loadDashboardModule(config.moduleBase, tabKey);
    }

    async function renderCustom(config, tabKey) {
      content.innerHTML = `
        <section>
          <h2 class="tab-panel-title">${config.title}</h2>
          <p class="tab-panel-intro">${config.intro}</p>
          ${config.body}
        </section>
      `;

      window.__ACTIVE_DATA_PREFIX__ = config.dataPrefix || "";
      patchD3ForDataPrefix();
      clearTransientTooltips();

      if (tabKey === "supplemental-visualizations") {
        await vegaEmbed("#consumption-choropleth", "data/consumptionChloropleth.vl.json", embedOptions).catch(console.error);
      }

      await loadDashboardModule(config.moduleBase, tabKey);
    }

    function renderPlaceholder(config) {
      removeOldModuleScript();
      content.innerHTML = `
        <section>
          <h2 class="tab-panel-title">${config.title}</h2>
          <p class="tab-panel-intro">${config.intro}</p>
          ${config.body}
        </section>
      `;
    }

    async function setActiveTab(tabKey) {
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tabKey);
      });

      const config = tabConfig[tabKey];
      if (!config) return;

      if (config.type === "dashboard") {
        await renderDashboard(tabKey, config);
      } else if (config.type === "custom") {
        await renderCustom(config, tabKey);
      } else {
        renderPlaceholder(config);
      }
    }

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => setActiveTab(button.dataset.tab));
    });

    setActiveTab("final-project");
  </script>
</body>
</html>
